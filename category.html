<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RareBears | Collection</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/custom.v4.css?v=1.2">
<link rel="stylesheet" href="assets/css/disable-text-selection.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');
  .font-cormorant {
    font-family: 'Cormorant Garamond', serif;
  }
  .gold-gradient {
    color: #D4AF37;
  }
  .animated-container {
    opacity: 0;
    transform: translateY(50px);
    will-change: transform, opacity;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="flex items-center space-x-2">
      <h1 class="font-cormorant text-3xl sm:text-4xl font-medium text-gray-900">Rare<span class="gold-gradient">Bears</span></h1>
    </a>
    <div class="flex items-center">
      <!-- Icons -->
      <div class="flex items-center space-x-4 ml-6">
        <a href="wishlist.html" class="relative text-gray-700 hover:text-red-500">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
          </svg>
          <span id="wishlist-count" class="absolute -top-2 -right-2 bg-black text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
        </a>
        <a href="cart.html" class="relative text-gray-700 hover:text-gold">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
          <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
        </a>
      </div>
      <!-- Menu Button -->
      <div class="flex items-center ml-4">
        <button id="menu-button" class="text-gray-700 focus:outline-none">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
      </div>
    </div>
  </div>
  <!-- Menu -->
  <div id="mobile-menu" class="hidden bg-white shadow-lg rounded-b-lg px-4 pb-4">
    <a href="index.html#collections" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Collections</a>
    <a href="wishlist.html" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Wishlist</a>
    <a href="cart.html" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Cart</a>
  </div>
</header>

<!-- Main Content -->
<main class="max-w-7xl mx-auto my-8 sm:my-12 px-4 sm:px-6">
    <h2 id="collection-title" class="animated-container text-3xl sm:text-4xl md:text-5xl font-cormorant font-medium text-gray-900 mb-4 text-center"></h2>
    <p id="collection-tagline" class="animated-container text-lg sm:text-xl text-gray-600 mb-10 text-center"></p>

    <div id="category-content" class="animated-container">
        <!-- Products Grid -->
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 sm:gap-12"></div>

        <div class="mt-12 text-center">
            <a href="index.html" class="secondary-button inline-flex items-center"><i class="fas fa-arrow-left mr-2"></i>Back to Home</a>
        </div>
    </div>
</main>
  
  <!-- Footer -->
  <footer id="page-footer" class="animated-container border-t border-gray-100 mt-12 sm:mt-20 pt-12 pb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="mb-6 md:mb-0 text-center md:text-left">
          <h3 class="font-cormorant text-2xl font-medium text-gray-900">Rare<span class="gold-gradient">Bears</span></h3>
          <p class="text-gray-500 text-sm mt-2">Curated Luxury Collectibles</p>
        </div>
        <div class="flex space-x-6">
          <a href="#" class="text-gray-500 hover:text-gray-900"><i class="fab fa-instagram"></i></a>
          <a href="#" class="text-gray-500 hover:text-gray-900"><i class="fab fa-pinterest"></i></a>
          <a href="#" class="text-gray-500 hover:text-gray-900"><i class="far fa-envelope"></i></a>
        </div>
      </div>
      <div class="mt-8 text-center text-gray-500 text-sm">
        © 2025 RareBears · All Rights Reserved
      </div>
    </div>
  </footer>

<script src="assets/js/cart.js"></script>
<script src="assets/js/wishlist.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        updateCartCount();
        updateWishlistCount();
        loadCategory();

        const menuButton = document.getElementById('menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        menuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    });

    async function loadCategory() {
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get("type");
        if (!category) { document.getElementById("collection-title").textContent = "Collection Not Found"; return; }

        const res = await fetch(`products.json?v=${new Date().getTime()}`);
        const data = await res.json();
        if (!data[category]) { document.getElementById("collection-title").textContent = "Collection Not Found"; return; }

        const titleMap = { diwali:"Diwali 2025 Collection", christmas:"Christmas 2025 Collection", halloween:"Halloween 2025 Collection", newyear:"New Year 2026 Collection" };
        const taglineMap = { 
            diwali: "A radiant collection capturing the essence of golden hour.",
            christmas: "Festive charm wrapped in a timeless, holiday-inspired embrace.",
            halloween: "Where luxury and mystery meet for a night of enchantment.",
            newyear: "Step into a new year with a rare symbol of joy and fresh beginnings."
        };

        document.getElementById("collection-title").textContent = titleMap[category];
        document.getElementById('collection-tagline').textContent = taglineMap[category];

        const container = document.getElementById("products-container");
        container.innerHTML = "";

        data[category].forEach((product, index) => {
            container.innerHTML += `
            <a href="product.html?type=${category}&id=${product.id}" class="product-card group block bg-white border border-gray-100 rounded-lg overflow-hidden shadow-lg hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 ease-in-out">
              <div class="aspect-square w-full overflow-hidden">
                <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
              </div>
              <div class="p-4 sm:p-6 flex flex-col">
                <h3 class="font-cormorant text-xl sm:text-2xl font-medium text-gray-900 mb-2">${product.name}</h3>
                <p class="text-gray-600 mb-4 text-base">${product.description}</p>
                <div class="flex items-center justify-between mt-auto">
                  <span class="font-medium text-gray-900 text-lg sm:text-xl">${product.price}</span>
                  <span class="text-sm uppercase tracking-wider border-b border-black pb-1 text-gray-700 group-hover:text-gold-600 transition-colors">Explore</span>
                </div>
              </div>
            </a>
            `;
        });

        gsap.registerPlugin(ScrollTrigger);

        gsap.to("#collection-title", {
            opacity: 1,
            y: 0,
            duration: 1,
            ease: "power2.out",
            scrollTrigger: {
                trigger: "#collection-title",
                start: "top 80%",
                toggleActions: "play none none none",
            },
        });

        gsap.to("#collection-tagline", {
            opacity: 1,
            y: 0,
            duration: 1,
            delay: 0.2,
            ease: "power2.out",
            scrollTrigger: {
                trigger: "#collection-title",
                start: "top 80%",
                toggleActions: "play none none none",
            },
        });

        gsap.to("#category-content", {
            opacity: 1,
            y: 0,
            stagger: 0.1,
            duration: 0.8,
            ease: "power2.out",
            scrollTrigger: {
                trigger: "#category-content",
                start: "top 80%",
                toggleActions: "play none none none",
            },
        });

        gsap.to("#page-footer", { 
            opacity: 1, 
            y: 0, 
            duration: 1, 
            ease: 'power2.out', 
            delay: 0.2 
        });
    }
</script>

</body>
</html>
