<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RareBears | Product</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/custom.v4.css?v=1.2">
<link rel="stylesheet" href="assets/css/notification.css">
<link rel="stylesheet" href="assets/css/disable-text-selection.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');
  .font-cormorant {
    font-family: 'Cormorant Garamond', serif;
  }
  .gold-gradient {
    color: #D4AF37;
  }
  .animated-container {
    opacity: 0;
    transform: translateY(50px);
    will-change: transform, opacity;
  }
  #add-to-wishlist-btn:hover {
    background-color: #FDFCFB;
    border-color: #D4AF37;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="flex items-center space-x-2">
      <h1 class="font-cormorant text-3xl sm:text-4xl font-medium text-gray-900">Rare<span class="gold-gradient">Bears</span></h1>
    </a>
    <div class="flex items-center">
      <!-- Icons -->
      <div class="flex items-center space-x-4 ml-6">
        <a href="wishlist.html" class="relative text-gray-700 hover:text-red-500">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
          </svg>
          <span id="wishlist-count" class="absolute -top-2 -right-2 bg-black text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
        </a>
        <a href="cart.html" class="relative text-gray-700 hover:text-gold">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
          <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
        </a>
      </div>
      <!-- Menu Button -->
      <div class="flex items-center ml-4">
        <button id="menu-button" class="text-gray-700 focus:outline-none">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
      </div>
    </div>
  </div>
  <!-- Menu -->
  <div id="mobile-menu" class="hidden bg-white shadow-lg rounded-b-lg px-4 pb-4">
    <a href="index.html#collections" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Collections</a>
    <a href="wishlist.html" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Wishlist</a>
    <a href="cart.html" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Cart</a>
  </div>
</header>

<!-- Main Content -->
<main class="max-w-7xl mx-auto my-8 sm:my-12 px-4 sm:px-6">
  <div id="product-content" class="animated-container">
    <div id="product-container" class="bg-white p-6 sm:p-12 rounded-lg shadow-lg hover:shadow-2xl transition-shadow duration-300 ease-in-out grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-center" style="min-height: 400px;">
        <p class="text-center text-gray-500 p-8 col-span-2">Loading...</p>
    </div>
    <div id="back-to-collections" class="text-center mt-8">
        <!-- Link injected via JS -->
    </div>
  </div>
</main>
  
  <!-- Footer -->
  <footer id="page-footer" class="animated-container border-t border-gray-100 mt-12 sm:mt-20 pt-12 pb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="mb-6 md:mb-0 text-center md:text-left">
          <h3 class="font-cormorant text-2xl font-medium text-gray-900">Rare<span class="gold-gradient">Bears</span></h3>
          <p class="text-gray-500 text-sm mt-2">Curated Luxury Collectibles</p>
        </div>
        <div class="flex space-x-6">
          <a href="#" class="text-gray-500 hover:text-gray-900"><i class="fab fa-instagram"></i></a>
          <a href="#" class="text-gray-500 hover:text-gray-900"><i class="fab fa-pinterest"></i></a>
          <a href="#" class="text-gray-500 hover:text-gray-900"><i class="far fa-envelope"></i></a>
        </div>
      </div>
      <div class="mt-8 text-center text-gray-500 text-sm">
        © 2025 RareBears · All Rights Reserved
      </div>
    </div>
  </footer>

<script src="assets/js/notification.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/wishlist.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const menuButton = document.getElementById('menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        menuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        loadProduct();
        updateWishlistCount();
        updateCartCount();

        gsap.to("#page-footer", { 
            opacity: 1, 
            y: 0, 
            duration: 1, 
            ease: 'power2.out', 
            delay: 0.2 
        });
    });

    async function loadProduct() {
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get("type");
        const id = parseInt(urlParams.get("id"));

        if (!category || isNaN(id)) {
            document.getElementById("product-container").innerHTML = "<p class='text-center text-red-500 col-span-2'>Product not found</p>";
            return;
        }

        const res = await fetch(`products.json?v=${new Date().getTime()}`);
        const data = await res.json();
        const product = data[category].find(p => p.id === id);

        if (!product) {
            document.getElementById("product-container").innerHTML = "<p class='text-center text-red-500 col-span-2'>Product not found</p>";
            return;
        }

        const container = document.getElementById("product-container");
        container.innerHTML = `
            <!-- Product Image -->
            <div class="aspect-square w-full overflow-hidden rounded-lg">
            <img id="main-image" src="${product.image}" alt="${product.name}" class="w-full h-full object-cover rounded-lg shadow-md">
            </div>
            
            <!-- Product Details -->
            <div class="flex flex-col">
            <div class="flex items-center space-x-4 mb-4">
                <span class="bg-gray-100 text-gray-700 text-xs font-semibold px-3 py-1 rounded-full">Limited: ${product.limited}</span>
            </div>
            <h2 class="font-cormorant text-3xl sm:text-4xl md:text-5xl font-medium text-gray-900 mb-4">${product.name}</h2>
            <p class="font-cormorant text-3xl sm:text-4xl text-gray-900 mb-6">${product.price}</p>
            <p class="text-gray-600 mb-8 leading-relaxed">${product.description}</p>
            <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-4">
                <button id="add-to-cart-btn" class="w-full sm:w-auto flex items-center justify-center bg-black text-white px-8 py-3 rounded-full font-semibold transition-colors duration-300">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg> Add to Cart
                </button>
                <button id="add-to-wishlist-btn" class="w-full sm:w-auto flex items-center justify-center border border-gray-300 text-gray-900 px-8 py-3 rounded-full font-semibold transition-colors duration-300">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg> Wishlist
                </button>
            </div>
            </div>
        `;
        
        // Add back to collections link
        const backLinkContainer = document.getElementById('back-to-collections');
        backLinkContainer.innerHTML = `<a href="category.html?type=${category}" class="secondary-button inline-flex items-center"><svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>Back to Collections</a>`;

        // Add event listener to the buttons
        document.getElementById('add-to-cart-btn').addEventListener('click', () => {
            addToCart(category, id);
        });

        document.getElementById('add-to-wishlist-btn').addEventListener('click', () => {
            addToWishlist(category, id);
        });

        // Animate the content
        gsap.registerPlugin(ScrollTrigger);
        gsap.to("#product-content", {
            opacity: 1,
            y: 0,
            duration: 1,
            ease: "power2.out",
            scrollTrigger: {
                trigger: "#product-content",
                start: "top 80%",
                toggleActions: "play none none none",
            },
        });
    }
</script>

</body>
</html>
