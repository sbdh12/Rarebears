
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RareBears | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/custom.v4.css?v=1.2">
    <link rel="stylesheet" href="assets/css/checkout-style.css">
    <link rel="stylesheet" href="assets/css/disable-text-selection.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');
        .font-cormorant { font-family: 'Cormorant Garamond', serif; }
        .gold-gradient {
            color: #D4AF37;
        }
        .animated-checkout-column {
            opacity: 0;
            transform: translateY(50px);
            will-change: transform, opacity;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="flex items-center space-x-2">
      <h1 class="font-cormorant text-3xl sm:text-4xl font-medium text-gray-900">Rare<span class="gold-gradient">Bears</span></h1>
    </a>
    <div class="flex items-center">
      <!-- Icons -->
      <div class="flex items-center space-x-4 ml-6">
        <a href="wishlist.html" class="relative text-gray-700 hover:text-red-500">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
          </svg>
          <span id="wishlist-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
        </a>
        <a href="cart.html" class="relative text-gray-700 hover:text-gold">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
          <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
        </a>
      </div>
      <!-- Menu Button -->
      <div class="flex items-center ml-4">
        <button id="menu-button" class="text-gray-700 focus:outline-none">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
      </div>
    </div>
  </div>
  <!-- Menu -->
  <div id="mobile-menu" class="hidden bg-white shadow-lg rounded-b-lg px-4 pb-4">
    <a href="index.html#collections" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Collections</a>
    <a href="wishlist.html" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Wishlist</a>
    <a href="cart.html" class="font-cormorant block py-2 text-gray-700 font-semibold hover:text-gold">Cart</a>
  </div>
</header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto my-8 sm:my-12 px-4 sm:px-6">
        <h2 class="text-3xl sm:text-4xl font-cormorant font-medium text-gray-900 mb-8 text-center">Checkout</h2>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-x-12 gap-y-8">

            <!-- Left Side: Shipping & Payment -->
            <div class="animated-checkout-column lg:col-span-2 space-y-8">
                <!-- Shipping Information -->
                <div class="bg-white p-6 sm:p-8 rounded-lg shadow-lg hover:shadow-2xl transition-shadow duration-300 ease-in-out">
                    <h3 class="text-2xl font-cormorant font-medium text-gray-900 mb-6">Shipping Information</h3>
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label for="full-name" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                            <input type="text" id="full-name" placeholder="Enter your full name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-transparent transition">
                        </div>
                        <div>
                            <label for="address" class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                            <input type="text" id="address" placeholder="123 Luxury Lane" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-transparent transition">
                        </div>
                        <div>
                            <label for="apartment" class="block text-sm font-medium text-gray-700 mb-2">Apartment, suite, etc. <span class="text-gray-500">(optional)</span></label>
                            <input type="text" id="apartment" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-transparent transition">
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label for="city" class="block text-sm font-medium text-gray-700 mb-2">City</label>
                                <input type="text" id="city" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-transparent transition">
                            </div>
                            <div>
                                <label for="postal-code" class="block text-sm font-medium text-gray-700 mb-2">Postal Code</label>
                                <input type="text" id="postal-code" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-transparent transition">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="bg-white p-6 sm:p-8 rounded-lg shadow-lg hover:shadow-2xl transition-shadow duration-300 ease-in-out">
                    <h3 class="text-2xl font-cormorant font-medium text-gray-900 mb-6">Payment Method</h3>
                    <div class="space-y-6">
                        <div>
                            <h4 class="text-sm font-medium text-gray-800 mb-4">Wallets</h4>
                            <div id="wallet-options" class="flex items-center gap-4 flex-wrap">
                                <!-- Payment Method Icons -->
                            </div>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-gray-800 mb-4">UPI</h4>
                            <div id="upi-options" class="flex items-center gap-4 flex-wrap">
                                <!-- UPI Method Icons -->
                            </div>
                            <div class="mt-4">
                                <label for="upi-id" class="block text-sm font-medium text-gray-700 mb-2">Your UPI ID</label>
                                <input type="text" id="upi-id" placeholder="Enter your UPI ID" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-transparent transition">
                            </div>
                        </div>
                    </div>
                    <button id="pay-now-btn" class="w-full mt-8 bg-black text-white px-6 py-3 rounded-full font-semibold transition-colors duration-300">Pay Now</button>
                </div>
            </div>

            <!-- Right Side: Order Summary -->
            <div class="animated-checkout-column lg:col-span-1">
                <div class="bg-white p-6 sm:p-8 rounded-lg shadow-lg hover:shadow-2xl transition-shadow duration-300 ease-in-out lg:sticky lg:top-28">
                    <h3 class="text-2xl font-cormorant font-medium text-gray-900 mb-6">Order Summary</h3>
                    <div id="checkout-summary-container" class="space-y-4">
                        <!-- Checkout summary items will be injected here -->
                    </div>
                    <div class="border-t border-gray-200 mt-6 pt-6">
                        <div class="flex justify-between items-center text-lg font-medium text-gray-900">
                            <span>Total</span>
                            <span id="checkout-total-price">₹0.00</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 mt-12 sm:mt-20 pt-12 pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="text-center text-gray-500 text-sm">
                &copy; 2025 RareBears &middot; All Rights Reserved
            </div>
        </div>
    </footer>

    <script src="assets/js/cart.js?v=2.1"></script>
    <script src="assets/js/wishlist.js?v=2.0"></script>
    <script src="assets/js/checkout.js?v=2.3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            updateWishlistCount();
            renderPaymentOptions();
            renderCheckoutSummary();

            const menuButton = document.getElementById('menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            menuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });

            // Animate the checkout columns
            gsap.registerPlugin(ScrollTrigger);
            gsap.to(".animated-checkout-column", {
                opacity: 1,
                y: 0,
                stagger: 0.2,
                duration: 1,
                ease: "power2.out",
                scrollTrigger: {
                    trigger: ".grid",
                    start: "top 80%",
                    toggleActions: "play none none none",
                },
            });
        });
    </script>

</body>
</html>
